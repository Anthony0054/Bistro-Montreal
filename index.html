<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bistro Le Plateau | Montréal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: '#2C2C2C',
            gold: '#C9A84C',
            'off-white': '#F8F5F0',
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['Montserrat', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #F8F5F0; }
    #hero {
      background-image: linear-gradient(rgba(44,44,44,0.65), rgba(44,44,44,0.55)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2070&auto=format&fit=crop');
      background-size: cover; background-position: center; background-attachment: fixed;
    }
    .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
    .hidden { display: none; }
  </style>
</head>

<body class="antialiased">

  <nav class="fixed top-0 left-0 right-0 z-50 bg-charcoal/90 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full border border-gold flex items-center justify-center text-gold font-serif">B</div>
        <span class="text-off-white font-serif tracking-wide">Bistro Le Plateau</span>
      </div>
      
      <div class="flex items-center gap-4">
        <button onclick="setLang('fr')" class="text-xs font-bold text-gold">FR</button>
        <button onclick="setLang('en')" class="text-xs font-bold text-white/60">EN</button>
        <a href="tel:5141234567" class="bg-gold px-4 py-2 rounded-full text-[10px] uppercase font-bold text-charcoal">Appeler</a>
      </div>
    </div>
  </nav>

  <section id="hero" class="min-h-screen flex items-center justify-center text-center px-4">
    <div class="max-w-3xl">
      <h1 class="font-serif text-5xl md:text-7xl text-off-white mb-6">
        <span data-lang="fr">L'âme de Montréal</span>
        <span data-lang="en" class="hidden">The Soul of Montreal</span>
      </h1>
      
      <div id="ai-container" class="hidden glass rounded-2xl p-6 mb-8 text-left animate-fadeIn">
        <p class="text-gold text-xs uppercase tracking-widest mb-2">Assistant IA</p>
        <p id="ai-response" class="text-off-white text-sm leading-relaxed italic">Analyse du menu en cours...</p>
      </div>

      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="#menu" class="bg-gold text-charcoal px-8 py-4 rounded-full text-xs font-bold uppercase tracking-widest">Voir le Menu</a>
        <button id="ai-btn" class="border-2 border-gold text-gold px-8 py-4 rounded-full text-xs font-bold uppercase tracking-widest bg-charcoal/40">🤖 Aide IA</button>
      </div>
    </div>
  </section>

  <section id="menu" class="py-20 px-6 max-w-5xl mx-auto">
    <div class="text-center mb-12">
      <h2 class="font-serif text-4xl text-charcoal mb-4">Menu du Bistro</h2>
      <div class="h-1 w-20 bg-gold mx-auto"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-center">
          <h4 class="font-serif text-lg font-bold">Soupe à l'oignon</h4>
          <span class="text-gold font-bold">$14</span>
        </div>
        <p class="text-gray-500 text-xs mt-2">Bouillon maison, gruyère fondu, croûtons.</p>
      </div>
      
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex justify-between items-center">
          <h4 class="font-serif text-lg font-bold">Tartare de betterave</h4>
          <span class="text-gold font-bold">$16</span>
        </div>
        <p class="text-gray-500 text-xs mt-2">Betteraves rôties, chèvre, noix. 🌱</p>
      </div>
    </div>
  </section>

  <script>
    // GESTION DES LANGUES
    function setLang(lang) {
      document.querySelectorAll('[data-lang]').forEach(el => {
        el.classList.add('hidden');
        if(el.getAttribute('data-lang') === lang) el.classList.remove('hidden');
      });
    }

    // CONNEXION GROQ VIA VERCEL API
    document.getElementById('ai-btn').onclick = async function(e) {
      e.preventDefault();
      const container = document.getElementById('ai-container');
      const response = document.getElementById('ai-response');
      
      container.classList.remove('hidden');
      response.innerText = "Claude analyse le menu pour vous...";

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: "Quelles sont vos recommandations pour un repas local ?" })
        });

        const data = await res.json();
        response.innerText = data.text;
      } catch (err) {
        response.innerText = "Erreur de connexion. Vérifiez que le dossier /api/chat.js existe sur GitHub.";
      }
    };
  </script>

</body>
</html>
